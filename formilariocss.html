
<html> 
<head>
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="Css/Styleformulario.css">
</head>
<body class="body">
    <header class="hearder">
        <h1 class="title"> Registro de Usuario</h1>
    </header>

    <main class="form-container">
        <form action="/submit" method="post" >

            <label class="label" for="Tipo de documento">Tipo de documento:</label>
            <select class="input" name="Tipo de documento" required>
                <option value="">Seleccione un tipo de documento</option>
                <option value="CC">Cédula de Ciudadanía</option>
                <option value="CE">Cédula de Extranjería</option>
                <option value="TI">Tarjeta de Identidad</option>
                <option value="PP">Pasaporte</option>
            </select><br><center></center><br>

            <label class="label" for="number">Número de documento:</label>
            <input class="input" type="text" id="number" name="number" required required maxlength="10"><br><br>

            <label class="label" for="name">Nombre:</label>
            <input class="input" type="text" id="name" name="name" required minlength="3" maxlength="64"><br><br>

            <label class="label" for="lastname">Apellido:</label>
            <input class="input" type="text" id="lastname" name="lastname" required minlength="3" maxlength="64"><br><br>

            <label class="label" for="phone">Número de teléfono:</label>
            <input class="input" type="tel" id="phone" name="phone" required maxlength="15"><br><br>

            <label class="label" for="address">Dirección:</label>
            <input class="input" type="text" id="address" name="address" required maxlength="100"><br><br>

            <label class="label" for="email">Correo Electrónico:</label>
            <input class="input" type="email" id="email" name="email" required pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}" required><br><br>

            <label class="label" for="hobbies">Pasatiempos:</label>
            <label class="text" for="hobbies1">Deportes</label><br>
            <input class="input" type="checkbox" id="hobbies2" name="hobbies" value="Música">
            <label class="text" for="hobbies2">Música</label><br>
            <input class="input" type="checkbox" id="hobbies3" name="hobbies" value="Lectura">
            <label class="text" for="hobbies3">Lectura</label><br>
            <input class="input" type="checkbox" id="hobbies4" name="hobbies" value="Viajar">
            <label class="text" for="hobbies4">Viajar</label>
            <input class="input" type="checkbox" id="hobbies5" name="hobbies" value="Cocinar">
            <br><br>

            <label class="label" for="usuario">Usuario:</label>
            <input class="input" type="text" id="usuario" name="usuario" required pattern="[A-Za-z]{3,14}[0-9]{0,2}" 
            title="Debe tener entre 3 y 16 caracteres, solo letras y hasta 2 números al final" required><br><br>

            <label class="label" for="password">Contraseña:</label>
            <input class="input" type="password" id="password" name="password" required  pattern="(?=(.*[A-Z]){1})(?=(.*[a-z]){2})(?=(.*[0-9]){5})(?=.*[!\?\-\+\/&\$]).{16}"
            title="Debe tener 16 caracteres, 1 mayúscula, 2 minúsculas, 5 números y 1 símbolo (!?-+/&$)"required><br><br>

            <label class="label" for="Registration date">Fecha de registro:</label>
            <input class="input" type="date" id="Registration date" name="Registration date" min="2026-02-15" max="2026-03-06" required><br><br>

            <input class="input" type="submit" value="enviar">
            <input class="input" type="reset" value="limpiar">

        </form>
    </main>

<footer class="footer">
    <audio controls>
    <source src="Audios/audio1.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
    </audio>

    <br><br>

    <video width="320" height="240" controls>
    <source src="Videos/video1.mp4" type="video/mp4">
    Your browser does not support the video tag.
    </video>
</footer>

</body>
</html>
